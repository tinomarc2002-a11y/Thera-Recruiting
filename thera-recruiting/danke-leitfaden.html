<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ihr Leitfaden | Thera-Recruiting</title>
<meta name="description" content="Vielen Dank für Ihr Interesse – hier ist Ihr kostenloser Recruiting-Leitfaden zum Download.">
<meta name="theme-color" content="#1B5B8B">
<meta name="robots" content="noindex,follow">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preload" href="fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/onest.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="fonts.css">
<style>
:root{
  --blue-deep:#1B5B8B; --blue-mid:#2C7BB6; --blue-soft:#E8F1F8;
  --orange:#F5A623; --orange-dark:#D88A0F;
  --cream:#FAF7F2; --paper:#FFFFFF; --ink:#14223A; --ink-soft:#3B4A60; --muted:#7A8499; --line:#E8E2D6;
  --font-display:'Fraunces',Georgia,serif; --font-body:'Onest',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font-body);font-size:17px;line-height:1.55;color:var(--ink);background:var(--cream);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  min-height:100vh;display:flex;flex-direction:column;}
img{max-width:100%;display:block;}
a{color:inherit;}
.container{max-width:1180px;margin:0 auto;padding:0 24px;width:100%;}
.site-header{padding:24px 0;border-bottom:1px solid rgba(232,226,214,.6);}
.site-header .container{display:flex;align-items:center;}
.brand img{height:42px;width:auto;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 0;}
.thanks-card{
  background:var(--paper);border:1px solid var(--blue-soft);border-radius:20px;
  max-width:620px;width:100%;text-align:center;padding:56px 44px;
  box-shadow:0 20px 40px -10px rgba(27,91,139,.16), 0 8px 16px -8px rgba(20,34,58,.08);
  position:relative;overflow:hidden;
}
.thanks-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--blue-deep) 0%,var(--blue-mid) 50%,var(--orange) 100%);}
.success-icon{width:76px;height:76px;background:var(--orange);border-radius:50%;
  margin:0 auto 28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 26px -8px rgba(245,166,35,.5);animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
.eyebrow{display:inline-block;font-size:13px;font-weight:600;color:var(--orange-dark);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;}
.thanks-card h1{font-family:var(--font-display);font-weight:500;font-size:clamp(28px,5vw,38px);
  line-height:1.15;letter-spacing:-.02em;margin-bottom:16px;}
.thanks-card p{color:var(--ink-soft);font-size:16px;line-height:1.6;max-width:460px;margin:0 auto 10px;}
.btn-primary{display:inline-flex;align-items:center;gap:10px;background:var(--orange);color:#fff;
  padding:17px 32px;border-radius:100px;font-weight:600;font-size:16px;text-decoration:none;
  margin-top:30px;box-shadow:0 8px 24px -8px rgba(245,166,35,.45);transition:all .2s ease;}
.btn-primary:hover{background:var(--orange-dark);transform:translateY(-2px);}
.btn-text{display:inline-block;margin-top:20px;font-size:14px;color:var(--muted);text-decoration:none;}
.btn-text:hover{color:var(--blue-deep);text-decoration:underline;}
.site-footer{padding:32px 0;border-top:1px solid var(--line);font-size:14px;color:var(--muted);}
.site-footer .container{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.site-footer a{color:var(--muted);text-decoration:none;margin-left:18px;}
.site-footer a:hover{color:var(--blue-deep);}
@media(max-width:560px){.thanks-card{padding:40px 24px;}.site-footer a{margin-left:0;margin-right:16px;}}
</style>
</head>
<body>
<header class="site-header">
  <div class="container">
    <div class="brand"><a href="index.html"><img src="logo.svg" alt="Thera-Recruiting"></a></div>
  </div>
</header>

<main>
  <div class="container">
    <div class="thanks-card">
      <div class="success-icon">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7,18 14,25 27,9"/></svg>
      </div>
      <div class="eyebrow">Fast geschafft</div>
      <h1>Ihr Leitfaden ist bereit.</h1>
      <p>Vielen Dank für Ihr Interesse. Klicken Sie auf den Button, um Ihren kostenlosen Leitfaden „7 Recruiting-Hebel für Therapie-Praxen 2026“ herunterzuladen.</p>

      <a class="btn-primary" href="leitfaden-recruiting-2026.pdf" download>
        Leitfaden herunterladen (PDF)
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2 V11 M4.5 7.5 L8 11 L11.5 7.5 M3 13.5 H13"/></svg>
      </a>
      <br>
      <a class="btn-text" href="index.html">Zurück zur Startseite</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div>© <span id="year"></span> Thera-Recruiting.de</div>
    <div>
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>
  </div>
</footer>
<script>document.getElementById('year').textContent=new Date().getFullYear();</script>
</body>
</html>
